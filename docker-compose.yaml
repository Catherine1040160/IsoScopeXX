services:
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: isoscopexx-mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:////workspace/logs/mlflow/mlflow.db
      --artifacts-destination /workspace/logs/mlflow/mlartifacts
      --host 0.0.0.0 --port 5002
      --disable-security-middleware
    ports:
      - "5002:5002"
    volumes:
      - ${LOGS_PATH}:/workspace/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    profiles:
      - server

  training:
    build:
      context: .
      args:
        PYTORCH_TAG: ${PYTORCH_TAG:-2.7.1-cuda11.8-cudnn9-runtime}
    shm_size: '16g'
    container_name: isoscopexx-training
    volumes:
      - ${DATA_PATH}:/workspace/data
      - ${LOGS_PATH}:/workspace/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      mlflow:
        condition: service_healthy
        required: false
    tty: true
    stdin_open: true
    command: >
      python train.py
      --yaml ${YAML_CONFIG}
      --prj ${PRJ:-default}
      --env docker
      ${EXTRA_TRAIN_ARGS:-}
    profiles:
      - train
